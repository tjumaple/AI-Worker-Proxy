name: Deploy to Cloudflare Workers

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  # ✂️ 我们已经彻底删除了原本的 lint 任务，直接保留部署任务
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    # 删除了 needs: lint，现在它不需要等待任何检查，可以直接运行
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Replace ROUTES_CONFIG in wrangler.toml
        env:
          ROUTES_CONFIG: ${{ vars.ROUTES_CONFIG }}
        run: |
          # 如果你没配 ROUTES_CONFIG 变量，提供一个空 JSON 作为兜底防止 jq 报错
          CONFIG_STR="${ROUTES_CONFIG:-{}}"
          MINIFIED_CONFIG=$(echo "$CONFIG_STR" | jq -c .)

          # Remove existing [vars] section and everything after it
          sed -i '/^\[vars\]/,$d' wrangler.toml

          # Add new [vars] section with GitHub Variable
          cat >> wrangler.toml << EOF

          [vars]
          ROUTES_CONFIG = '''${MINIFIED_CONFIG}'''
          EOF

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
