name: Deploy to Cloudflare Workers

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24' # 🌟 核心修复 1：强制使用极其稳定的 Node 20 环境，规避 Node 24 的编译崩溃
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Replace ROUTES_CONFIG in wrangler.toml
        env:
          ROUTES_CONFIG: ${{ vars.ROUTES_CONFIG }}
        run: |
          CONFIG_STR="${ROUTES_CONFIG:-{}}"
          MINIFIED_CONFIG=$(echo "$CONFIG_STR" | jq -c .)
          sed -i '/^\[vars\]/,$d' wrangler.toml
          cat >> wrangler.toml << EOF

          [vars]
          ROUTES_CONFIG = '''${MINIFIED_CONFIG}'''
          EOF

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          packageManager: pnpm # 🌟 核心修复 2：明确告诉 Wrangler 我们用的是 pnpm
